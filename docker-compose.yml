services:
  
  server:
    image: gitea/gitea:latest
    container_name: gitea
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - ./data:/data
      - ./custom:/app/gitea/custom
      - ./log:/app/gitea/log
    ports:
      - "3001:3000"
      - "2222:22"
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demowebsite
    ports:
      - "3000:3000"
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"